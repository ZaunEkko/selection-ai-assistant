version: 2
updates:
  - package-ecosystem: npm
    directory: /selection-ai-assistant
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: cargo
    directory: /selection-ai-assistant/src-tauri
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
