name: Feature request
description: 建议新功能或交互改进
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景
      description: 你希望解决什么问题？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述期望的行为、交互或 API。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你目前如何绕过这个问题？

  - type: textarea
    id: privacy
    attributes:
      label: 隐私与平台影响
      description: 是否涉及选中文本、截图、剪贴板、provider、全局输入或新平台权限？

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索现有 Issues，没有找到相同建议。
          required: true
        - label: 此建议不包含 API key、token 或其他秘密。
          required: true
